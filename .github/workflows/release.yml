name: Release

# Publishes alias packages to PyPI via Trusted Publishing (OIDC) — no API
# token/secret — on a version-tag push.
#
# Each package uses its OWN GitHub environment (named identically to the
# package): PyPI PENDING publishers must each have a UNIQUE
# (owner, repo, workflow, environment) tuple.
#
# NOTE: PyPI caps PENDING trusted publishers at 3 per account. So the first
# release publishes 3 names; once live they become regular (non-pending)
# publishers and free the slots, then `experts-4bit` is registered + added
# back to the matrix for a follow-up tag. `skip-existing: true` makes any
# re-run idempotent (already-uploaded versions are skipped, not errored).
#
# Each package name needs a PyPI pending publisher (see SETUP.md), pointing at:
#   owner: pjordanandrsn | repo: e4b | workflow: release.yml | environment: <the package name>
#
# Publish:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # First 3 (PyPI pending-publisher cap = 3). `experts-4bit` is added
        # back here once the first three publish and free a pending slot.
        pkg: [e4b, e4b-qlora, experts4bit, experts-mxfp4]
    environment:
      name: ${{ matrix.pkg }}
      url: https://pypi.org/p/${{ matrix.pkg }}
    permissions:
      id-token: write # mint the OIDC token PyPI trusts (per matrix job)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel for ${{ matrix.pkg }}
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/${{ matrix.pkg }} --outdir dist
      - name: Publish ${{ matrix.pkg }} to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
