name: Release

# Publishes ALL alias packages to PyPI via Trusted Publishing (OIDC) — no API
# token/secret — on a single version-tag push. Each package name below must
# have a PyPI pending publisher configured (see SETUP.md), all pointing at
# owner: pjordanandrsn | repo: e4b | workflow: release.yml
#
# Publish everything at once:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [e4b, e4b-qlora, experts4bit, experts-4bit]
    permissions:
      id-token: write # mint the OIDC token PyPI trusts (per matrix job)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel for ${{ matrix.pkg }}
        run: |
          python -m pip install --upgrade pip build
          python -m build packages/${{ matrix.pkg }} --outdir dist
      - name: Publish ${{ matrix.pkg }} to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
